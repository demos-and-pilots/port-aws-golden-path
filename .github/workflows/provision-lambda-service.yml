name: "[Port] Provisionar servicio Lambda completo"

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: "Nombre del servicio (kebab-case)"
        required: true
        type: string
      description:
        description: "Descripción del servicio"
        required: true
        type: string
      squad:
        description: "Squad propietario (identifier en Port)"
        required: true
        type: string
      runtime:
        description: "Runtime Lambda"
        required: true
        type: string
        default: "python3.12"
      memory_mb:
        description: "Memoria en MB"
        required: false
        type: number
        default: 256
      timeout_seconds:
        description: "Timeout en segundos"
        required: false
        type: number
        default: 30
      data_classification:
        description: "Clasificación de datos"
        required: true
        type: string
        default: "internal"
      aws_region:
        description: "Región AWS"
        required: false
        type: string
        default: "us-east-1"
      required_reviewers:
        description: "Reviewers requeridos"
        required: false
        type: number
        default: 1
      port_run_id:
        description: "Port Run ID"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  # ─── PASO 1: Crear repositorio GitHub ───────────────────────────────────────
  create-repository:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_ORG_TOKEN }}
      GITHUB_ORG: ${{ secrets.GITHUB_ORG }}
      PORT_CLIENT_ID: ${{ secrets.PORT_CLIENT_ID }}
      PORT_CLIENT_SECRET: ${{ secrets.PORT_CLIENT_SECRET }}
    outputs:
      repo_url: ${{ steps.create.outputs.repo_url }}
      port_token: ${{ steps.port-token.outputs.token }}

    steps:
      - name: Obtener token de Port
        id: port-token
        run: |
          TOKEN=$(curl -s -X POST \
            "https://api.getport.io/v1/auth/access_token" \
            -H "Content-Type: application/json" \
            -d '{"clientId":"'"$PORT_CLIENT_ID"'","clientSecret":"'"$PORT_CLIENT_SECRET"'"}' \
            | jq -r '.accessToken')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Notificar progreso (1/4 - Repositorio)
        run: |
          curl -s -X PATCH \
            "https://api.getport.io/v1/actions/runs/${{ inputs.port_run_id }}" \
            -H "Authorization: Bearer ${{ steps.port-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"status":"IN_PROGRESS","message":{"run_status":"[1/4] Creando repositorio GitHub..."}}'

      - name: Crear repo desde template
        id: create
        run: |
          TEMPLATE="lambda-${{ inputs.runtime == 'python3.12' && 'python' || inputs.runtime == 'nodejs20.x' && 'nodejs' || 'java' }}-template"

          gh api \
            --method POST \
            "/repos/$GITHUB_ORG/$TEMPLATE/generate" \
            -f owner="$GITHUB_ORG" \
            -f name="${{ inputs.service_name }}" \
            -f description="${{ inputs.description }}" \
            -F private=true

          sleep 5

          REPO_URL=$(gh api "/repos/$GITHUB_ORG/${{ inputs.service_name }}" --jq '.html_url')
          echo "repo_url=$REPO_URL" >> $GITHUB_OUTPUT

      - name: Configurar branch protection
        run: |
          gh api --method PUT \
            "/repos/$GITHUB_ORG/${{ inputs.service_name }}/branches/main/protection" \
            --input - <<EOF
          {
            "required_status_checks": {"strict": true, "contexts": ["ci / lint","ci / test","ci / security"]},
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "required_approving_review_count": ${{ inputs.required_reviewers }},
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": true
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false
          }
          EOF

      - name: Crear CODEOWNERS
        run: |
          gh api --method PUT \
            "/repos/$GITHUB_ORG/${{ inputs.service_name }}/contents/CODEOWNERS" \
            -f message="chore: add CODEOWNERS [skip ci]" \
            -f content="$(echo -n "* @$GITHUB_ORG/${{ inputs.squad }}" | base64)"

  # ─── PASO 2: Crear IAM Role con OIDC en AWS dev ─────────────────────────────
  create-iam-role:
    runs-on: ubuntu-latest
    needs: create-repository
    environment: dev
    outputs:
      role_arn: ${{ steps.create-role.outputs.role_arn }}

    steps:
      - uses: actions/checkout@v4

      - name: Notificar progreso (2/4 - IAM Role OIDC)
        env:
          PORT_TOKEN: ${{ needs.create-repository.outputs.port_token }}
        run: |
          curl -s -X PATCH \
            "https://api.getport.io/v1/actions/runs/${{ inputs.port_run_id }}" \
            -H "Authorization: Bearer $PORT_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"IN_PROGRESS","message":{"run_status":"[2/4] Creando IAM Role con OIDC..."}}'

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_PLATFORM }}
          aws-region: ${{ inputs.aws_region }}

      - name: Crear IAM Role para GitHub Actions OIDC
        id: create-role
        env:
          GITHUB_ORG: ${{ secrets.GITHUB_ORG }}
          ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID_DEV }}
        run: |
          ROLE_NAME="github-actions-${{ inputs.service_name }}"
          TRUST_POLICY=$(cat <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": {
                "Federated": "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"
              },
              "Action": "sts:AssumeRoleWithWebIdentity",
              "Condition": {
                "StringLike": {
                  "token.actions.githubusercontent.com:sub": "repo:${GITHUB_ORG}/${{ inputs.service_name }}:*"
                },
                "StringEquals": {
                  "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                }
              }
            }]
          }
          EOF
          )

          ROLE_ARN=$(aws iam create-role \
            --role-name "$ROLE_NAME" \
            --assume-role-policy-document "$TRUST_POLICY" \
            --description "GitHub Actions OIDC role para ${{ inputs.service_name }}" \
            --tags Key=Service,Value="${{ inputs.service_name }}" \
                   Key=ManagedBy,Value="port" \
                   Key=Squad,Value="${{ inputs.squad }}" \
            --query 'Role.Arn' --output text)

          # Política mínima para operar Lambda
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "lambda-deploy-policy" \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Action": [
                    "lambda:UpdateFunctionCode",
                    "lambda:PublishVersion",
                    "lambda:UpdateAlias",
                    "lambda:GetAlias",
                    "lambda:ListVersionsByFunction",
                    "lambda:GetFunction",
                    "lambda:InvokeFunction"
                  ],
                  "Resource": "arn:aws:lambda:*:*:function:${{ inputs.service_name }}-*"
                },
                {
                  "Effect": "Allow",
                  "Action": ["logs:CreateLogGroup","logs:PutRetentionPolicy"],
                  "Resource": "arn:aws:logs:*:*:log-group:/aws/lambda/${{ inputs.service_name }}-*"
                },
                {
                  "Effect": "Allow",
                  "Action": ["secretsmanager:GetSecretValue"],
                  "Resource": "arn:aws:secretsmanager:*:*:secret:${{ inputs.data_classification }}/${{ inputs.service_name }}/*"
                }
              ]
            }'

          echo "role_arn=$ROLE_ARN" >> $GITHUB_OUTPUT

      - name: Guardar ARN del role en GitHub Variables del repo
        env:
          GH_TOKEN: ${{ secrets.GH_ORG_TOKEN }}
          GITHUB_ORG: ${{ secrets.GITHUB_ORG }}
        run: |
          gh api --method POST \
            "/repos/$GITHUB_ORG/${{ inputs.service_name }}/actions/variables" \
            -f name="AWS_ROLE_DEV" \
            -f value="${{ steps.create-role.outputs.role_arn }}"

          gh api --method POST \
            "/repos/$GITHUB_ORG/${{ inputs.service_name }}/actions/variables" \
            -f name="AWS_REGION" \
            -f value="${{ inputs.aws_region }}"

          gh api --method POST \
            "/repos/$GITHUB_ORG/${{ inputs.service_name }}/actions/variables" \
            -f name="LAMBDA_NAME" \
            -f value="${{ inputs.service_name }}"

  # ─── PASO 3: Crear función Lambda en dev ────────────────────────────────────
  create-lambda:
    runs-on: ubuntu-latest
    needs: [create-repository, create-iam-role]
    environment: dev
    outputs:
      log_group_arn: ${{ steps.create-lambda.outputs.log_group_arn }}

    steps:
      - name: Notificar progreso (3/4 - Lambda)
        env:
          PORT_TOKEN: ${{ needs.create-repository.outputs.port_token }}
        run: |
          curl -s -X PATCH \
            "https://api.getport.io/v1/actions/runs/${{ inputs.port_run_id }}" \
            -H "Authorization: Bearer $PORT_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"IN_PROGRESS","message":{"run_status":"[3/4] Creando función Lambda en dev..."}}'

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_PLATFORM }}
          aws-region: ${{ inputs.aws_region }}

      - name: Crear CloudWatch Log Group
        run: |
          aws logs create-log-group \
            --log-group-name "/aws/lambda/${{ inputs.service_name }}-dev"
          aws logs put-retention-policy \
            --log-group-name "/aws/lambda/${{ inputs.service_name }}-dev" \
            --retention-in-days 30

      - name: Crear función Lambda stub en dev
        id: create-lambda
        env:
          LAMBDA_ROLE_ARN: ${{ vars.LAMBDA_EXECUTION_ROLE_ARN }}
        run: |
          # Crear ZIP stub mínimo para bootstrapping
          echo 'def handler(event, context): return {"statusCode": 200, "body": "ok"}' > handler.py
          zip stub.zip handler.py

          aws lambda create-function \
            --function-name "${{ inputs.service_name }}-dev" \
            --runtime "${{ inputs.runtime }}" \
            --role "$LAMBDA_ROLE_ARN" \
            --handler "handler.handler" \
            --zip-file fileb://stub.zip \
            --memory-size ${{ inputs.memory_mb }} \
            --timeout ${{ inputs.timeout_seconds }} \
            --environment "Variables={ENV=dev,SERVICE_NAME=${{ inputs.service_name }}}" \
            --tags "Squad=${{ inputs.squad }},DataClassification=${{ inputs.data_classification }},ManagedBy=port"

          aws lambda wait function-active \
            --function-name "${{ inputs.service_name }}-dev"

          # Publicar versión inicial y crear alias live
          VERSION=$(aws lambda publish-version \
            --function-name "${{ inputs.service_name }}-dev" \
            --query Version --output text)

          aws lambda create-alias \
            --function-name "${{ inputs.service_name }}-dev" \
            --name live \
            --function-version "$VERSION"

          LOG_GROUP_ARN=$(aws logs describe-log-groups \
            --log-group-name-prefix "/aws/lambda/${{ inputs.service_name }}-dev" \
            --query 'logGroups[0].arn' --output text)
          echo "log_group_arn=$LOG_GROUP_ARN" >> $GITHUB_OUTPUT

  # ─── PASO 4: Registrar entidades en Port ────────────────────────────────────
  register-in-port:
    runs-on: ubuntu-latest
    needs: [create-repository, create-iam-role, create-lambda]
    env:
      PORT_CLIENT_ID: ${{ secrets.PORT_CLIENT_ID }}
      PORT_CLIENT_SECRET: ${{ secrets.PORT_CLIENT_SECRET }}

    steps:
      - name: Obtener token de Port
        id: port-token
        run: |
          TOKEN=$(curl -s -X POST \
            "https://api.getport.io/v1/auth/access_token" \
            -H "Content-Type: application/json" \
            -d '{"clientId":"'"$PORT_CLIENT_ID"'","clientSecret":"'"$PORT_CLIENT_SECRET"'"}' \
            | jq -r '.accessToken')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Notificar progreso (4/4 - Registrando en Port)
        run: |
          curl -s -X PATCH \
            "https://api.getport.io/v1/actions/runs/${{ inputs.port_run_id }}" \
            -H "Authorization: Bearer ${{ steps.port-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"status":"IN_PROGRESS","message":{"run_status":"[4/4] Registrando entidades en Port..."}}'

      - name: Crear entidad - Repositorio
        run: |
          curl -s -X POST \
            "https://api.getport.io/v1/blueprints/githubRepository/entities?upsert=true" \
            -H "Authorization: Bearer ${{ steps.port-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{
              "identifier": "${{ inputs.service_name }}",
              "title": "${{ inputs.service_name }}",
              "properties": {
                "repoUrl": "${{ needs.create-repository.outputs.repo_url }}",
                "defaultBranch": "main",
                "visibility": "private",
                "language": "${{ inputs.runtime }}",
                "branchProtection": true,
                "requiredReviewers": ${{ inputs.required_reviewers }},
                "hasCodeowners": true,
                "hasCiPipeline": true,
                "hasCdPipeline": true,
                "createdAt": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
              },
              "relations": { "team": "${{ inputs.squad }}" }
            }'

      - name: Crear entidad - Lambda Function
        run: |
          curl -s -X POST \
            "https://api.getport.io/v1/blueprints/lambdaFunction/entities?upsert=true" \
            -H "Authorization: Bearer ${{ steps.port-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{
              "identifier": "${{ inputs.service_name }}-dev",
              "title": "${{ inputs.service_name }} (dev)",
              "properties": {
                "functionName": "${{ inputs.service_name }}-dev",
                "runtime": "${{ inputs.runtime }}",
                "memorySize": ${{ inputs.memory_mb }},
                "timeout": ${{ inputs.timeout_seconds }},
                "environment": "dev",
                "deployStatus": "success",
                "lastDeployedVersion": "1",
                "lastDeployedAt": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'",
                "currentAlias": "live",
                "dataClassification": "${{ inputs.data_classification }}",
                "awsRegion": "${{ inputs.aws_region }}",
                "logGroupArn": "${{ needs.create-lambda.outputs.log_group_arn }}",
                "iamRoleArn": "${{ needs.create-iam-role.outputs.role_arn }}",
                "hasOidcRole": true,
                "hasSecrets": false
              },
              "relations": {
                "repository": "${{ inputs.service_name }}"
              }
            }'

      - name: Actualizar Port - Éxito final
        if: success()
        run: |
          curl -s -X PATCH \
            "https://api.getport.io/v1/actions/runs/${{ inputs.port_run_id }}" \
            -H "Authorization: Bearer ${{ steps.port-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status": "SUCCESS",
              "message": {
                "run_status": "Servicio aprovisionado exitosamente",
                "repo_url": "${{ needs.create-repository.outputs.repo_url }}",
                "lambda_name": "${{ inputs.service_name }}-dev",
                "iam_role": "${{ needs.create-iam-role.outputs.role_arn }}",
                "next_steps": "Haz tu primer commit en la rama develop para disparar el pipeline CI."
              }
            }'

      - name: Actualizar Port - Error
        if: failure()
        run: |
          curl -s -X PATCH \
            "https://api.getport.io/v1/actions/runs/${{ inputs.port_run_id }}" \
            -H "Authorization: Bearer ${{ steps.port-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"status":"FAILURE","message":{"run_status":"El aprovisionamiento falló. Revisa los logs del workflow para identificar el paso que falló."}}'
